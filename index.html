<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honda R&D Americas — Route</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #e8e8e8; font-family: 'Courier New', monospace; overflow: hidden; width: 100vw; height: 100vh; }
canvas { display: block; background: #e8e8e8; }
#overlay { position: fixed; inset: 0; pointer-events: none; z-index: 500; background: radial-gradient(ellipse at center, transparent 50%, rgba(200,200,200,0.15) 100%); }
#ui { position: fixed; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
.label-small { font-size: 10px; letter-spacing: 0.3em; color: rgba(30, 30, 30, 0.6); text-transform: uppercase; margin-bottom: 4px; }
.label-main { font-size: 13px; letter-spacing: 0.15em; color: rgba(20, 20, 20, 0.9); text-transform: uppercase; }
#status { position: fixed; top: 120px; left: 20px; z-index: 10; font-size: 10px; color: rgba(30, 30, 30, 0.7); }
.dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #e8334a; margin-right: 4px; animation: pulse 1.5s infinite; }
#distance-bar { position: fixed; bottom: 80px; left: 20px; z-index: 10; }
.dist-label { font-size: 10px; color: rgba(30, 30, 30, 0.5); text-transform: uppercase; margin-bottom: 6px; }
.dist-value { font-size: 28px; color: rgba(20, 20, 20, 0.9); font-weight: bold; }
.dist-unit { font-size: 11px; color: rgba(30, 30, 30, 0.5); letter-spacing: 0.2em; }
#controls { position: fixed; bottom: 20px; left: 20px; z-index: 10; display: flex; gap: 10px; }
.btn { background: rgba(255,255,255,0.85); border: 1px solid rgba(0,0,0,0.2); color: rgba(20,20,20,0.8); padding: 8px 20px; font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; border-radius: 2px; }
.btn:hover { background: rgba(255,255,255,1); border-color: rgba(0,0,0,0.4); }
#progress-bar { position: fixed; bottom: 0; left: 0; width: 0%; height: 3px; background: linear-gradient(90deg, #e8334a, #ff6b35); z-index: 9; transition: width 0.1s linear; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body>
<canvas id="map"></canvas>
<div id="overlay"></div>
<div id="ui">
  <div class="label-small">Honda R&D Americas</div>
  <div class="label-main">Route Navigation</div>
  <div style="margin-top:8px; font-size:10px; color:rgba(0,255,180,0.4);">TORRANCE · CA · USA</div>
</div>
<div id="status">
  <div><span class="dot"></span><span id="status-text">Initializing route...</span></div>
  <div style="font-size:9px; color:rgba(0,255,180,0.3); margin-top:4px;" id="coords-text">34.0195° N, 118.4912° W</div>
</div>
<div id="distance-bar">
  <div class="dist-label">Distance</div>
  <div class="dist-value" id="dist-value">0.0</div>
  <div class="dist-unit">miles</div>
</div>
<div id="controls">
  <button class="btn" onclick="restartAnimation()">↺ Replay</button>
  <button class="btn" onclick="toggleSpeed()">⏩ Speed</button>
</div>
<div id="progress-bar"></div>

<script>
const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const HONDA = [33.8285, -118.2829];
const START = [34.0195, -118.4912];

const routeCoords = [
[34.0195, -118.4912], [34.0150, -118.4850], [34.0080, -118.4700], [33.9950, -118.4600], [33.9800, -118.4480],
[33.9650, -118.4400], [33.9500, -118.4350], [33.9350, -118.4100], [33.9200, -118.3900], [33.9100, -118.3750],
[33.9000, -118.3600], [33.8900, -118.3450], [33.8800, -118.3300], [33.8700, -118.3200], [33.8600, -118.3100],
[33.8500, -118.3000], [33.8400, -118.2950], [33.8350, -118.2900], [33.8310, -118.2865], [33.8285, -118.2829]
];

function interpolateRoute(coords, steps) {
  const result = [];
  for (let i = 0; i < coords.length - 1; i++) {
    const a = coords[i], b = coords[i + 1];
    for (let t = 0; t < steps; t++) {
      const ratio = t / steps;
      result.push([a[0] + (b[0] - a[0]) * ratio, a[1] + (b[1] - a[1]) * ratio]);
    }
  }
  result.push(coords[coords.length - 1]);
  return result;
}

const fullRoute = interpolateRoute(routeCoords, 20);

function latLngToScreen(lat, lng) {
  const centerLng = -118.39, centerLat = 33.93, scale = 1500;
  const x = canvas.width / 2 + (lng - centerLng) * scale;
  const y = canvas.height / 2 - (lat - centerLat) * scale;
  return [x, y];
}

function calcDistance(a, b) {
  const R = 3958.8;
  const dLat = (b[0] - a[0]) * Math.PI / 180;
  const dLon = (b[1] - a[1]) * Math.PI / 180;
  const lat1 = a[0] * Math.PI / 180;
  const lat2 = b[0] * Math.PI / 180;
  const x = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

let step = 0, animId = null, speedMult = 1;

function updateStatus(idx) {
  const coord = fullRoute[idx];
  document.getElementById('coords-text').textContent = `${coord[0].toFixed(4)}° N, ${Math.abs(coord[1]).toFixed(4)}° W`;
  
  const progress = idx / fullRoute.length;
  if (progress < 0.1) document.getElementById('status-text').textContent = 'Departing Santa Monica...';
  else if (progress < 0.5) document.getElementById('status-text').textContent = 'Route active — I-405 S';
  else if (progress < 0.85) document.getElementById('status-text').textContent = 'Approaching Torrance...';
  else document.getElementById('status-text').textContent = 'Arriving at Honda R&D';
  
  let dist = 0;
  for (let i = 1; i <= idx && i < fullRoute.length; i++) dist += calcDistance(fullRoute[i-1], fullRoute[i]);
  document.getElementById('dist-value').textContent = dist.toFixed(1);
  document.getElementById('progress-bar').style.width = (progress * 100) + '%';
}

function draw() {
  const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  gradient.addColorStop(0, '#e8e8e8');
  gradient.addColorStop(1, '#d8d8d8');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = 'rgba(232, 51, 74, 0.1)';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  for (let i = 0; i < fullRoute.length; i++) {
    const [x, y] = latLngToScreen(fullRoute[i][0], fullRoute[i][1]);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.strokeStyle = '#e8334a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let i = 0; i <= step && i < fullRoute.length; i++) {
    const [x, y] = latLngToScreen(fullRoute[i][0], fullRoute[i][1]);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.strokeStyle = 'rgba(232, 51, 74, 0.2)';
  ctx.lineWidth = 10;
  ctx.beginPath();
  for (let i = 0; i <= step && i < fullRoute.length; i++) {
    const [x, y] = latLngToScreen(fullRoute[i][0], fullRoute[i][1]);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  if (step < fullRoute.length) {
    const [x, y] = latLngToScreen(fullRoute[step][0], fullRoute[step][1]);
    ctx.fillStyle = 'rgba(232, 51, 74, 0.2)';
    ctx.beginPath();
    ctx.arc(x, y, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e8334a';
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, 7, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function animate() {
  if (step < fullRoute.length) {
    draw();
    updateStatus(step);
    step++;
    const delay = Math.max(10, 40 / speedMult);
    animId = setTimeout(animate, delay);
  } else {
    draw();
    document.getElementById('status-text').textContent = '✓ Arrived — Honda R&D Americas';
  }
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
});

function restartAnimation() {
  if (animId) clearTimeout(animId);
  step = 0;
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('dist-value').textContent = '0.0';
  draw();
  setTimeout(animate, 500);
}

function toggleSpeed() {
  speedMult = speedMult === 1 ? 3 : speedMult === 3 ? 6 : 1;
  document.querySelectorAll('.btn')[1].textContent = speedMult === 1 ? '⏩ Speed' : speedMult === 3 ? '⏩⏩ Fast' : '⏩⏩⏩ Max';
}

setTimeout(() => animate(), 1000);
</script>
</body>
</html>
