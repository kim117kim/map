<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honda R&D Americas — Route</title>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0f;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #map {
    width: 100vw;
    height: 100vh;
  }

  /* 비네트 */
  #vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
  }

  /* 상단 UI */
  #ui-top {
    position: fixed;
    top: 32px;
    left: 36px;
    z-index: 20;
    pointer-events: none;
  }

  .tag {
    font-size: 9px;
    letter-spacing: 0.35em;
    color: rgba(51,130,204,0.6);
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .title {
    font-size: 14px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.88);
    text-transform: uppercase;
    font-weight: normal;
  }

  .subtitle {
    margin-top: 4px;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  /* 진행바 */
  #progress-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(255,255,255,0.06);
    z-index: 20;
    pointer-events: none;
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #3382CC, #66b3ff);
    box-shadow: 0 0 8px rgba(51,130,204,0.8);
    transition: width 0.15s linear;
  }

  /* 하단 좌측 상태 */
  #ui-bottom-left {
    position: fixed;
    bottom: 36px;
    left: 36px;
    z-index: 20;
    pointer-events: none;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 7px;
  }

  .pulse-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #3382CC;
    animation: dotPulse 1.8s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(51,130,204,0.6); }
    50% { opacity: 0.5; box-shadow: 0 0 0 4px rgba(51,130,204,0); }
  }

  .status-label {
    font-size: 9px;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }

  .coords {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.2);
    padding-left: 14px;
  }

  /* 하단 우측 거리 */
  #ui-bottom-right {
    position: fixed;
    bottom: 36px;
    right: 36px;
    z-index: 20;
    pointer-events: none;
    text-align: right;
  }

  .dist-tag {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .dist-num {
    font-size: 30px;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .dist-unit {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(51,130,204,0.7);
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* 컨트롤 */
  #controls {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    gap: 10px;
  }

  .btn {
    background: rgba(13,13,15,0.85);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.55);
    padding: 7px 18px;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(6px);
  }

  .btn:hover {
    border-color: rgba(51,130,204,0.6);
    color: rgba(51,130,204,0.9);
  }

  /* 뷰 모드 표시 */
  #view-label {
    position: fixed;
    top: 32px;
    right: 36px;
    z-index: 20;
    pointer-events: none;
    text-align: right;
  }

  .view-tag {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(51,130,204,0.5);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="map"></div>
<div id="vignette"></div>
<div id="progress-wrap"><div id="progress-bar"></div></div>

<div id="ui-top">
  <div class="tag">Navigation Active</div>
  <div class="title">Honda R&D Americas</div>
  <div class="subtitle">Torrance · CA · USA</div>
</div>

<div id="view-label">
  <div class="view-tag" id="view-mode-text">Top View</div>
</div>

<div id="ui-bottom-left">
  <div class="status-row">
    <div class="pulse-dot"></div>
    <div class="status-label" id="status-text">Initializing...</div>
  </div>
  <div class="coords" id="coords-text">34.0195° N, 118.4912° W</div>
</div>

<div id="ui-bottom-right">
  <div class="dist-tag">Distance</div>
  <div class="dist-num" id="dist-num">0.0</div>
  <div class="dist-unit">miles</div>
</div>

<div id="controls">
  <button class="btn" onclick="restartAnim()">↺ Replay</button>
  <button class="btn" onclick="cycleSpeed()">⏩ <span id="speed-label">1×</span></button>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoieXVqb3VuZyIsImEiOiJjbW44YWNjam8wNXBwMnBzOTF6Zmo2YnpvIn0._CsYP2CjJKOSOCv8VZ203Q';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [-118.2829, 33.8285], // Honda 출발지 중심
  zoom: 11.5,
  pitch: 0,
  bearing: 0,
  antialias: true,
});

const HONDA = [-118.2829, 33.8285];
const START = [-118.4912, 34.0195];

const waypoints = [
  [-118.2829, 33.8285],
  [-118.2865, 33.8310],
  [-118.2900, 33.8350],
  [-118.2950, 33.8400],
  [-118.3000, 33.8500],
  [-118.3100, 33.8600],
  [-118.3200, 33.8700],
  [-118.3300, 33.8800],
  [-118.3450, 33.8900],
  [-118.3600, 33.9000],
  [-118.3750, 33.9100],
  [-118.3900, 33.9200],
  [-118.4100, 33.9350],
  [-118.4350, 33.9500],
  [-118.4400, 33.9650],
  [-118.4480, 33.9800],
  [-118.4600, 33.9950],
  [-118.4700, 34.0080],
  [-118.4850, 34.0150],
  [-118.4912, 34.0195],
];

function interpolate(coords, steps) {
  const result = [];
  for (let i = 0; i < coords.length - 1; i++) {
    const a = coords[i], b = coords[i+1];
    for (let t = 0; t < steps; t++) {
      const r = t / steps;
      result.push([a[0]+(b[0]-a[0])*r, a[1]+(b[1]-a[1])*r]);
    }
  }
  result.push(coords[coords.length-1]);
  return result;
}

const fullRoute = interpolate(waypoints, 60);

function dist(a, b) {
  const R = 3958.8;
  const dLat = (b[1]-a[1]) * Math.PI/180;
  const dLon = (b[0]-a[0]) * Math.PI/180;
  const lat1 = a[1]*Math.PI/180, lat2 = b[1]*Math.PI/180;
  const x = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

let step = 0, animId = null, speedMult = 1;
const cameraSequence = [
  { progress: 0,    pitch: 0,  bearing: 0,   zoom: 11,   label: 'Top View' },
  { progress: 0.2,  pitch: 45, bearing: -20, zoom: 12.5, label: 'Perspective' },
  { progress: 0.45, pitch: 60, bearing: -35, zoom: 13,   label: '3D View' },
  { progress: 0.65, pitch: 30, bearing: 10,  zoom: 12,   label: 'Tilted View' },
  { progress: 0.85, pitch: 55, bearing: 20,  zoom: 13.5, label: 'Perspective' },
  { progress: 1.0,  pitch: 0,  bearing: 0,   zoom: 14,   label: 'Top View' },
];

function getCameraAt(progress) {
  for (let i = cameraSequence.length - 1; i >= 0; i--) {
    if (progress >= cameraSequence[i].progress) {
      const curr = cameraSequence[i];
      const next = cameraSequence[Math.min(i+1, cameraSequence.length-1)];
      const t = i === cameraSequence.length-1 ? 1 : (progress - curr.progress) / (next.progress - curr.progress);
      return {
        pitch: curr.pitch + (next.pitch - curr.pitch) * t,
        bearing: curr.bearing + (next.bearing - curr.bearing) * t,
        zoom: curr.zoom + (next.zoom - curr.zoom) * t,
        label: curr.label,
      };
    }
  }
  return cameraSequence[0];
}

map.on('load', () => {
  map.addLayer({
    id: '3d-buildings',
    source: 'composite',
    'source-layer': 'building',
    filter: ['==', 'extrude', 'true'],
    type: 'fill-extrusion',
    minzoom: 12,
    paint: {
      'fill-extrusion-color': '#1a1a2e',
      'fill-extrusion-height': ['get', 'height'],
      'fill-extrusion-base': ['get', 'min_height'],
      'fill-extrusion-opacity': 0.75,
    }
  });

  new mapboxgl.Marker({ color: '#3382CC' }).setLngLat(START).addTo(map);
  new mapboxgl.Marker({ color: '#3382CC' }).setLngLat(HONDA).setPopup(new mapboxgl.Popup({ offset: 25, closeButton: false }).setText('Honda R&D Americas')).addTo(map);

  map.addSource('route-bg', {
    type: 'geojson',
    data: { type: 'Feature', geometry: { type: 'LineString', coordinates: fullRoute } }
  });
  map.addLayer({
    id: 'route-bg',
    type: 'line',
    source: 'route-bg',
    paint: {
      'line-color': 'rgba(51,130,204,0.12)',
      'line-width': 10,
      'line-cap': 'round',
    }
  });

  map.addSource('route-anim', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [] } } });
  map.addLayer({ id: 'route-glow', type: 'line', source: 'route-anim', paint: { 'line-color': 'rgba(51,130,204,0.25)', 'line-width': 14, 'line-cap': 'round', 'line-blur': 4 }});
  map.addLayer({ id: 'route-line', type: 'line', source: 'route-anim', paint: { 'line-color': '#3382CC', 'line-width': 3.5, 'line-cap': 'round' }});

  map.addSource('moving-dot', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'Point', coordinates: START } } });
  map.addLayer({ id: 'moving-dot-glow', type: 'circle', source: 'moving-dot', paint: { 'circle-radius': 14, 'circle-color': 'rgba(51,130,204,0.2)', 'circle-blur': 0.5 }});
  map.addLayer({ id: 'moving-dot', type: 'circle', source: 'moving-dot', paint: { 'circle-radius': 6, 'circle-color': '#3382CC', 'circle-stroke-width': 2, 'circle-stroke-color': '#ffffff' }});

  setTimeout(() => startAnim(), 1200);
});

function startAnim() { step = 0; animate(); }
function animate() {
  if (step >= fullRoute.length) { document.getElementById('status-text').textContent = '✓ Arrived — Honda R&D Americas'; return; }

  const current = fullRoute.slice(0, step + 1);
  map.getSource('route-anim').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: current }});
  map.getSource('moving-dot').setData({ type: 'Feature', geometry: { type: 'Point', coordinates: fullRoute[step] }});

  const progress = step / fullRoute.length;
  const cam = getCameraAt(progress);
  if (step % 8 === 0) {
    map.easeTo({ center: fullRoute[step], pitch: cam.pitch, bearing: cam.bearing, zoom: cam.zoom, duration: 800, easing: t => t });
    document.getElementById('view-mode-text').textContent = cam.label;
  }

  let d = 0;
  for (let i = 1; i <= step && i < fullRoute.length; i++) d += dist(fullRoute[i-1], fullRoute[i]);
  document.getElementById('dist-num').textContent = d.toFixed(1);
  document.getElementById('progress-bar').style.width = (progress * 100) + '%';

  const c = fullRoute[step];
  document.getElementById('coords-text').textContent = `${c[1].toFixed(4)}° N, ${Math.abs(c[0]).toFixed(4)}° W`;
  if (progress < 0.1) document.getElementById('status-text').textContent = 'Departing Santa Monica...';
  else if (progress < 0.5) document.getElementById('status-text').textContent = 'Route active — I-405 S';
  else if (progress < 0.85) document.getElementById('status-text').textContent = 'Approaching Torrance...';
  else document.getElementById('status-text').textContent = 'Arriving at Honda R&D...';

  step++;
  const delay = Math.max(8, 45 / speedMult);
  animId = setTimeout(() => requestAnimationFrame(animate), delay);
}

function restartAnim() {
  if (animId) clearTimeout(animId);
  step = 0;
  map.getSource('route-anim').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: [] }});
  map.getSource('moving-dot').setData({ type: 'Feature', geometry: { type: 'Point', coordinates: START }});
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('dist-num').textContent = '0.0';
  map.flyTo({ center: [-118.39, 33.93], zoom: 11, pitch: 0, bearing: 0, duration: 1500 });
  setTimeout(() => startAnim(), 1800);
}

const speeds = [1,2,4,8];
let speedIdx = 0;
function cycleSpeed() { speedIdx = (speedIdx + 1) % speeds.length; speedMult = speeds[speedIdx]; document.getElementById('speed-label').textContent = speedMult + '×'; }
</script>
</body>
</html>
